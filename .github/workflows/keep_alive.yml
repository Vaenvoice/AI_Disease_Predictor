name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes to stay within Render's 15-min free tier limit
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -I -s https://ai-disease-predictor-nbdj.onrender.com/ | grep "HTTP/"
          echo "Backend pinged successfully"

      - name: Ping Frontend
        run: |
          curl -I -s https://vaen-health.onrender.com/ | grep "HTTP/"
          echo "Frontend pinged successfully"
