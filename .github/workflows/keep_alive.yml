name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Ping every 10 minutes to prevent Render free-tier spin-down
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        if: env.BACKEND_URL != ''
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          curl -I -s "$BACKEND_URL" | grep "HTTP/"
          echo "Backend pinged successfully"

      - name: Ping Frontend
        if: env.FRONTEND_URL != ''
        env:
          FRONTEND_URL: ${{ secrets.RENDER_FRONTEND_URL }}
        run: |
          curl -I -s "$FRONTEND_URL" | grep "HTTP/"
          echo "Frontend pinged successfully"
